<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { width: 300px; padding: 10px; font-family: sans-serif; background: #fff; margin:0;}
        .title { font-weight: bold; font-size: 16px; margin-bottom: 10px; color: #1e3a8a; }
        .btn { display: block; width: 100%; padding: 10px; margin-bottom: 8px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; text-align: left; transition: opacity 0.2s;}
        .btn:hover { opacity: 0.9; }
        .btn-disk { background: #10b981; color: white; }
        .btn-service { background: #3b82f6; color: white; }
        #errorMsg { color: red; margin-bottom: 8px; font-size: 12px; display: none;}
        hr { border: 0; border-top: 1px solid #eee; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="title" data-i18n="popupTitle">Opciones de Artículo</div>
    <div id="errorMsg"></div>
    <button id="btnDisk" class="btn btn-disk" data-i18n="btnExtractDisk">💾 Grabar en disco</button>
    <hr>
    <div class="title" style="font-size: 14px; color: #666;" data-i18n="selectService">Procesar con IA</div>
    <div id="servicesContainer">
        <div style="font-size:12px;color:#999" data-i18n="optModelLoading">Cargando servicios...</div>
    </div>
    <div style="margin-top: 10px; text-align: center;">
        <a href="#" id="openOptions" style="font-size: 12px; color: #2563eb; text-decoration: none;" data-i18n="optPageTitle">⚙️ Configurar servicios</a>
    </div>
    <script src="i18n.js"></script>
    <script src="popup.js"></script>
</body>
</html>
