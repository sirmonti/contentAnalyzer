<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Procesando con IA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #1e1e2f; color: #f8f8f2; max-width: 900px; margin: 0 auto; line-height: 1.6; }
        h1 { color: #f1fa8c; border-bottom: 1px solid #444; padding-bottom: 10px;}
        #status { font-size: 18px; margin-bottom: 20px; color: #8be9fd; }
        .box { background: #282a36; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); white-space: pre-wrap; font-family: monospace; font-size: 14px;}
        .loader { border: 4px solid #444; border-top: 4px solid #8be9fd; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1><span data-i18n="resHeader">Resultado - </span><span id="serviceName">...</span></h1>
    <div id="status"><div class="loader"></div> <span data-i18n="statusProcessing">Procesando...</span></div>
    <div class="box" id="resultBox" style="display:none"></div>
    <button id="saveBtn" style="display:none; margin-top:20px; padding:10px 20px; background:#50fa7b; color:#282a36; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:16px;" data-i18n="resSaveBtn">Guardar en archivo</button>
    <script src="i18n.js"></script>
    <script src="result.js"></script>
</body>
</html>
